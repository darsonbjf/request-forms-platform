server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: http://loki:3100/loki/api/v1/push

positions:
  filename: /tmp/positions.yml

scrape_configs:
  - job_name: forms-api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: forms-api
          __path__: /var/log/forms/*.log
